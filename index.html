<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Tickets UMG</title>
    <style>
        :root { --bg: #F0F2F7; --navy: #0D1F3C; --orange: #E8580A; --border: #d1d8e8; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; color: #1a1a1a; }
        header { text-align: center; padding: 25px; background: var(--navy); color: var(--orange); box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .logo { height: 100px; margin-bottom: 10px; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5)); }
        .container { max-width: 900px; margin: 30px auto; padding: 0 20px; }
        .card { background: white; padding: 25px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid var(--border); border-radius: 6px; box-sizing: border-box; }
        button { background: var(--navy); color: white; font-weight: bold; cursor: pointer; border: none; }
        button:hover { opacity: 0.9; }
        .btn-vender { background: var(--orange); margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { border-bottom: 1px solid var(--border); padding: 12px; text-align: left; }
        th { background: #f8f9fa; color: var(--navy); }
        .hidden { display: none; }
        footer { margin-top: 50px; padding: 30px; border-top: 1px solid var(--border); text-align: center; color: #666; font-size: 14px; background: white; }
    </style>
</head>
<body>

<header>
    <img src="https://i.ibb.co/hRJQ7ZqC/01-Logo-2026-sticker.png" alt="Logo" class="logo">
    <h1 style="margin:0; font-size:22px;">CONTROL DE TICKETS ANIVERSARIO UMG</h1>
</header>

<div class="container">
    <div id="login-section" class="card" style="max-width:400px; margin:40px auto;">
        <h3 style="text-align:center; color:var(--navy);">ACCESO</h3>
        <input type="text" id="user" placeholder="Usuario">
        <input type="password" id="pass" placeholder="Contraseña">
        <button id="btn-login" onclick="login()">INGRESAR</button>
    </div>

    <div id="main-section" class="hidden">
        <div class="card" style="display:flex; justify-content:space-between; align-items:center; padding:10px 20px;">
            <span>👤 <b id="vendedor-name"></b> (<span id="rol-tag"></span>)</span>
            <button onclick="location.reload()" style="width:auto; padding:5px 15px; background:#555;">Salir</button>
        </div>

        <div id="action-section" class="card">
            <h3>ASIGNAR TICKET (Q25.00)</h3>
            <input type="text" id="search-input" placeholder="Buscar nombre..." oninput="search()">
            <div id="results" style="border:1px solid #eee; border-radius:4px; max-height:150px; overflow-y:auto;"></div>
            
            <div id="form-registro" class="hidden" style="margin-top:20px; border-top:2px solid var(--orange); padding-top:15px;">
                <p>Estudiante: <b id="sel-nombre" style="color:var(--navy);"></b></p>
                <div style="display:flex; gap:10px;">
                    <input type="text" id="sel-ciclo" placeholder="Ciclo">
                    <input type="text" id="sel-seccion" placeholder="Sección">
                </div>
                <input type="number" id="num-ticket" placeholder="No. de Ticket Físico" style="border-color:var(--orange); font-weight:bold;">
                <button class="btn-vender" onclick="vender()">REGISTRAR VENTA</button>
            </div>
        </div>

        <div class="card">
            <h3>HISTORIAL DE VENTAS</h3>
            <div id="admin-stats" class="hidden" style="padding:10px; background:#e8f5e9; color:#2e7d32; border-radius:4px; margin-bottom:10px; font-weight:bold;"></div>
            <div style="overflow-x:auto;">
                <table>
                    <thead>
                        <tr><th>Estudiante</th><th>Ciclo</th><th>Sec.</th><th>Ticket</th><th>Vendedor</th><th>Fecha</th><th>Acción</th></tr>
                    </thead>
                    <tbody id="tickets-body"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<footer>
    <div>· Universidad Mariano Gálvez · Puerto Barrios, Izabal ·</div>
    <div style="font-weight:bold; color:var(--navy); margin-top:5px;">© M.A. Inga. Delmy Valiente</div>
</footer>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbx4KTDlQM5tO79lFR7DErjduI2cwXsCaOpEn5DxwNO76uqXgh0NllHMbLe5Jcddnx-N/exec';
    let currentUser = {};

    async function login() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        const btn = document.getElementById('btn-login');
        if(!u || !p) return alert('Llene los campos');
        
        btn.innerText = 'Verificando...';
        btn.disabled = true;

        try {
            const res = await fetch(`${API_URL}?action=login&user=${u}&pass=${p}`).then(r => r.json());
            if(res.success) {
                currentUser = res;
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('main-section').classList.remove('hidden');
                document.getElementById('vendedor-name').innerText = res.user;
                document.getElementById('rol-tag').innerText = res.rol;
                if(res.rol === 'consultor') document.getElementById('action-section').classList.add('hidden');
                loadTickets();
            } else {
                alert('Credenciales incorrectas');
                btn.innerText = 'INGRESAR';
                btn.disabled = false;
            }
        } catch(e) {
            alert('Error de conexión. Revise que Apps Script esté publicado para "Cualquier persona".');
            btn.innerText = 'INGRESAR';
            btn.disabled = false;
        }
    }

    async function search() {
        const q = document.getElementById('search-input').value;
        if(q.length < 3) return document.getElementById('results').innerHTML = '';
        const res = await fetch(`${API_URL}?action=search&query=${q}`).then(r => r.json());
        let html = '';
        res.forEach(r => {
            html += `<div style="padding:10px; border-bottom:1px solid #eee; cursor:pointer;" onclick="selectEst('${r[0]}','${r[1]}','${r[2]}')"><b>${r[0]}</b> (${r[1]}-${r[2]})</div>`;
        });
        document.getElementById('results').innerHTML = html;
    }

    function selectEst(n, c, s) {
        document.getElementById('form-registro').classList.remove('hidden');
        document.getElementById('sel-nombre').innerText = n;
        document.getElementById('sel-ciclo').value = c !== 'undefined' ? c : '';
        document.getElementById('sel-seccion').value = s !== 'undefined' ? s : '';
        document.getElementById('results').innerHTML = '';
    }

    async function vender() {
        const data = {
            action: 'registerTicket',
            nombre: document.getElementById('sel-nombre').innerText,
            ciclo: document.getElementById('sel-ciclo').value,
            seccion: document.getElementById('sel-seccion').value,
            ticket: document.getElementById('num-ticket').value,
            vendedor: currentUser.user
        };
        if(!data.ticket) return alert('Ingrese el número de ticket');
        
        await fetch(API_URL, { method: 'POST', body: JSON.stringify(data) });
        alert('Venta registrada con éxito');
        document.getElementById('form-registro').classList.add('hidden');
        document.getElementById('search-input').value = '';
        loadTickets();
    }

    async function loadTickets() {
        const res = await fetch(`${API_URL}?action=getTickets`).then(r => r.json());
        let html = '';
        let total = 0;
        res.slice(1).forEach((r, idx) => {
            total += 25;
            let btn = currentUser.rol === 'admin' ? `<button onclick="deleteT(${idx+1})" style="width:auto; padding:2px 8px; background:red; font-size:10px;">X</button>` : '';
            html += `<tr><td>${r[0]}</td><td>${r[1]}</td><td>${r[6]||'-'}</td><td style="color:var(--orange); font-weight:bold;">#${r[2]}</td><td>${r[4]}</td><td>${new Date(r[5]).toLocaleDateString()}</td><td>${btn}</td></tr>`;
        });
        document.getElementById('tickets-body').innerHTML = html;
        if(currentUser.rol === 'admin') {
            document.getElementById('admin-stats').innerText = `TOTAL RECAUDADO: Q${total}.00 | TICKETS: ${res.length-1}`;
            document.getElementById('admin-stats').classList.remove('hidden');
        }
    }

    async function deleteT(idx) {
        if(!confirm('¿Eliminar registro?')) return;
        await fetch(API_URL, { method: 'POST', body: JSON.stringify({action:'deleteTicket', row:idx, role:currentUser.rol}) });
        loadTickets();
    }
</script>

</body>
</html>
