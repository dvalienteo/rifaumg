<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Tickets UMG</title>
    <style>
        :root { --navy: #0D1F3C; --orange: #E8580A; --bg: #F0F2F7; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        header { text-align: center; padding: 20px; background: var(--navy); color: white; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        .logo { height: 100px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4)); margin-bottom: 8px; }
        .container { max-width: 900px; margin: 20px auto; padding: 0 15px; flex: 1; }
        .card { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 6px rgba(0,0,0,0.05); border: 1px solid #ddd; }
        h3 { margin-top: 0; border-bottom: 2px solid var(--orange); display: inline-block; padding-bottom: 4px; margin-bottom: 15px; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: var(--navy); color: white; font-weight: bold; cursor: pointer; border: none; transition: 0.2s; }
        button:hover { opacity: 0.9; }
        .btn-orange { background: var(--orange); }
        .hidden { display: none; }
        
        /* VENTANA MODAL */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; justify-content: center; align-items: center; z-index: 3000; }
        .modal-content { background: white; padding: 25px; border-radius: 12px; width: 90%; max-width: 380px; text-align: center; position: relative; }
        .close-btn { position: absolute; top: 10px; right: 15px; font-size: 24px; cursor: pointer; color: #999; }

        .res-item { padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; }
        .res-item:hover { background: #f0f7ff; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { border-bottom: 1px solid #eee; padding: 10px; text-align: left; }
        .badge-paid { background: #e8f5e9; color: #2e7d32; padding: 4px 8px; border-radius: 5px; font-weight: bold; font-size: 11px; }
        footer { padding: 25px; background: white; border-top: 1px solid #ddd; text-align: center; color: #666; font-size: 13px; margin-top: 30px; }
    </style>
</head>
<body>

<header>
    <img src="https://i.ibb.co/hRJQ7ZqC/01-Logo-2026-sticker.png" class="logo">
    <h1 style="margin:0; font-size: 22px;">SISTEMA DE TICKETS UMG 2026</h1>
</header>

<div class="container">
    <div id="login-section" class="card" style="max-width:380px; margin: 40px auto;">
        <h3 style="display:block; text-align:center">BIENVENIDO</h3>
        <input type="text" id="user" placeholder="Usuario">
        <input type="password" id="pass" placeholder="Contraseña">
        <button onclick="login()">INGRESAR</button>
    </div>

    <div id="main-section" class="hidden">
        <div class="card" style="display:flex; justify-content:space-between; align-items:center; flex-wrap: wrap; gap: 10px;">
            <div>👤 <b id="v-name"></b> (<span id="v-rol" style="text-transform:uppercase;"></span>)</div>
            <div style="display:flex; gap:8px;">
                <button onclick="openPassModal()" style="width:auto; padding:6px 12px; background:#6c757d; font-size:12px;">Cambiar Contraseña</button>
                <button onclick="location.reload()" style="width:auto; padding:6px 12px; background:#cc0000; font-size:12px;">Salir</button>
            </div>
        </div>

        <div id="action-section" class="card hidden">
            <h3 style="color:var(--orange)">➕ REGISTRAR VENTA</h3>
            <input type="text" id="reg-search" placeholder="Buscar nombre de alumno..." oninput="searchReg()">
            <div id="reg-results" style="max-height:150px; overflow-y:auto; border:1px solid #eee; border-radius:5px;"></div>
            
            <div id="form-registro" class="hidden" style="margin-top:15px; background:#fffcf5; padding:15px; border:1px solid #ffeeba; border-radius:8px;">
                <p>Estudiante: <b id="sel-nombre"></b></p>
                <div style="display:flex; gap:10px;">
                    <input type="text" id="sel-ciclo" placeholder="Ciclo">
                    <input type="text" id="sel-seccion" placeholder="Sección">
                </div>
                <input type="number" id="num-ticket" placeholder="Número de Ticket">
                <button class="btn-orange" onclick="vender()">GUARDAR REGISTRO</button>
            </div>
        </div>

        <div class="card">
            <h3 style="color:var(--navy)">🔍 CONSULTAR ESTATUS</h3>
            <input type="text" id="status-search" placeholder="Nombre completo para verificar pago..." oninput="searchStatus()">
            <div id="status-results" style="margin-top:10px;"></div>
        </div>

        <div class="card">
            <h3>HISTORIAL</h3>
            <div id="admin-stats" class="hidden" style="margin-bottom:12px; font-weight:bold; color:#2e7d32; text-align:center;"></div>
            <div style="overflow-x:auto;">
                <table>
                    <thead><tr><th>Alumno</th><th>Ticket</th><th>Vendedor</th><th>Fecha</th></tr></thead>
                    <tbody id="t-body"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div id="pass-modal" class="modal hidden">
    <div class="modal-content">
        <span class="close-btn" onclick="closePassModal()">&times;</span>
        <h3 style="border:none; margin-bottom:10px;">Nueva Contraseña</h3>
        <p style="font-size:12px; color:#777; margin-bottom:15px;">Usuario: <span id="user-id-display"></span></p>
        <input type="password" id="new-pass" placeholder="Escriba su nueva clave">
        <button class="btn-orange" onclick="updatePass()">ACTUALIZAR AHORA</button>
    </div>
</div>

<footer>
    <div>· Universidad Mariano Gálvez · Puerto Barrios, Izabal ·</div>
    <div>© M.A. Inga. Delmy Valiente</div>
</footer>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbx4KTDlQM5tO79lFR7DErjduI2cwXsCaOpEn5DxwNO76uqXgh0NllHMbLe5Jcddnx-N/exec';
    let currentUser = {};

    // GESTIÓN MODAL
    function openPassModal() {
        document.getElementById('user-id-display').innerText = currentUser.id;
        document.getElementById('pass-modal').classList.remove('hidden');
    }
    function closePassModal() { document.getElementById('pass-modal').classList.add('hidden'); }

    async function login() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        const res = await fetch(`${API_URL}?action=login&user=${u}&pass=${p}`).then(r => r.json());
        if(res.success) {
            currentUser = res;
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('main-section').classList.remove('hidden');
            document.getElementById('v-name').innerText = res.user;
            document.getElementById('v-rol').innerText = res.rol;
            if(res.rol !== 'consultor') document.getElementById('action-section').classList.remove('hidden');
            loadTickets();
        } else { alert('Credenciales incorrectas'); }
    }

    async function updatePass() {
        const nP = document.getElementById('new-pass').value;
        if(!nP) return alert('Ingrese la clave');
        await fetch(API_URL, {
            method: 'POST',
            body: JSON.stringify({action: 'changePass', user: currentUser.id, newPass: nP})
        });
        alert('Contraseña actualizada correctamente.');
        location.reload();
    }

    async function searchReg() {
        const q = document.getElementById('reg-search').value;
        if(q.length < 3) return document.getElementById('reg-results').innerHTML = '';
        const res = await fetch(`${API_URL}?action=search&query=${q}`).then(r => r.json());
        let h = '';
        res.forEach(r => h += `<div class="res-item" onclick="selectEst('${r[0]}','${r[1]}','${r[2]}')">${r[0]}</div>`);
        document.getElementById('reg-results').innerHTML = h;
    }

    function selectEst(n, c, s) {
        document.getElementById('form-registro').classList.remove('hidden');
        document.getElementById('sel-nombre').innerText = n;
        document.getElementById('sel-ciclo').value = (c != 'undefined' ? c : '');
        document.getElementById('sel-seccion').value = (s != 'undefined' ? s : '');
        document.getElementById('reg-results').innerHTML = '';
    }

    async function vender() {
        const data = {
            action: 'registerTicket',
            nombre: document.getElementById('sel-nombre').innerText,
            ciclo: document.getElementById('sel-ciclo').value,
            seccion: document.getElementById('sel-seccion').value,
            ticket: document.getElementById('num-ticket').value,
            vendedor: currentUser.user
        };
        if(!data.ticket) return alert('Ponga el número de ticket');
        await fetch(API_URL, { method: 'POST', body: JSON.stringify(data) });
        alert('Venta registrada');
        document.getElementById('form-registro').classList.add('hidden');
        document.getElementById('reg-search').value = '';
        loadTickets();
    }

    async function searchStatus() {
        const q = document.getElementById('status-search').value;
        if(q.length < 3) return document.getElementById('status-results').innerHTML = '';
        const students = await fetch(`${API_URL}?action=search&query=${q}`).then(r => r.json());
        let h = '';
        for(let s of students) {
            const tks = await fetch(`${API_URL}?action=checkStatus&nombre=${encodeURIComponent(s[0])}`).then(r => r.json());
            let l = tks.length > 0 ? tks.map(t => `<span class="badge-paid">Ticket #${t[2]}</span>`).join(' ') : '<span style="color:red; font-size:11px;">No ha pagado</span>';
            h += `<div style="padding:10px; background:#f9f9f9; margin-bottom:5px; border-radius:5px;"><b>${s[0]}</b><br>${l}</div>`;
        }
        document.getElementById('status-results').innerHTML = h;
    }

    async function loadTickets() {
        const res = await fetch(`${API_URL}?action=getTickets`).then(r => r.json());
        let h = ''; let total = 0;
        res.slice(1).reverse().forEach(r => {
            total += 25;
            h += `<tr><td>${r[0]}</td><td style="color:var(--orange)">#${r[2]}</td><td>${r[4]}</td><td>${new Date(r[5]).toLocaleDateString()}</td></tr>`;
        });
        document.getElementById('t-body').innerHTML = h;
        if(currentUser.rol === 'admin') {
            document.getElementById('admin-stats').innerText = `TOTAL RECAUDADO: Q${total}.00`;
            document.getElementById('admin-stats').classList.remove('hidden');
        }
    }
</script>
</body>
</html>
